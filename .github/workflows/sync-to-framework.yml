name: Sync agent to tech-marketing-framework

on:
  push:
    branches: [main]
    paths:
      - '.claude/agents/how-they-market.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: j1ngg/tech-marketing-framework
          path: target
          token: ${{ secrets.SYNC_PAT }}

      - name: Copy agent file
        run: cp .claude/agents/how-they-market.md target/.claude/agents/how-they-market.md

      - name: Commit and push if changed
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/agents/how-they-market.md
          git diff --staged --quiet || git commit -m "Sync how-they-market agent from source repo"
          git push
